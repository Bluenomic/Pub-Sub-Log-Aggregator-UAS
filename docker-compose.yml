services:
  # Aggregator
  aggregator:
    build: ./aggregator
    image: uts-aggregator:latest
    depends_on:
      storage:
        condition: service_healthy
      broker:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://user:pass@storage:5432/logdb
      - BROKER_URL=redis://broker:6379
      - WORKER_COUNT=4
      - APP_HOST=0.0.0.0
      - APP_PORT=8080
    ports:
      - "8080:8080"
    volumes:
      - aggregator_data:/var/lib/aggregator
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  # Publisher
  publisher:
    build: ./publisher
    image: uts-publisher:latest
    depends_on:
      aggregator:
        condition: service_healthy
      broker:
        condition: service_healthy
    environment:
      - TARGET_URL=http://aggregator:8080/publish
      - BROKER_URL=redis://broker:6379
      - EVENT_COUNT=20000
      - DUPLICATE_RATE=0.3
      - BATCH_SIZE=50
    restart: "no"
    networks:
      - internal

  # Broker
  broker:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - broker_data:/data
    networks:
      - internal

  # Storage 
  storage:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=logdb
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d logdb"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal

# Persistence
volumes:
  pg_data:
    name: uas_pg_data
  broker_data:
    name: uas_broker_data
  aggregator_data:
    name: uas_aggregator_data

# Internal Network
networks:
  internal:
    driver: bridge
    name: uas_internal
